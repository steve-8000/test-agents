apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-agents
  labels:
    app: test-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-agents
  template:
    metadata:
      labels:
        app: test-agents
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: assets
              mountPath: /usr/share/nginx/html/assets
              readOnly: true
      volumes:
        - name: site
          configMap:
            name: test-agents-site
        - name: assets
          configMap:
            name: test-agents-assets
