apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: test-agents

resources:
  - deploy/k8s/deployment.yaml
  - deploy/k8s/service.yaml
  - deploy/k8s/ingress.yaml

# 사이트 파일을 ConfigMap으로 생성 — 내용이 바뀌면 이름 해시가 바뀌어
# Deployment가 자동 롤아웃된다(이미지 빌드/레지스트리 불필요).
configMapGenerator:
  - name: test-agents-site
    files:
      - site/index.html
      - site/01-onboarding.html
      - site/02-home-week.html
      - site/03-compose.html
      - site/04-event-detail.html
      - site/05-complete.html
      - site/06-share-card.html
      - site/07-timeline.html
      - site/08-settings.html
  - name: test-agents-assets
    files:
      - site/assets/tokens.css
      - site/assets/base.css
      - site/assets/app.js
